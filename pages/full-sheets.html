<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Sheet Stock | LNI Console</title>
    <link rel="stylesheet" href="../styles/dashboard.css">
</head>
<body data-page-mode="full-sheet">
    <div id="header-placeholder"></div>

    <main class="content-container">
        <div class="header-action-row">
            <h1>Full Sheet Stock</h1>
            <button class="btn-primary" onclick="toggleForm()">+ Add New Stock</button>
        </div>

        <section id="add-item-form" class="inventory-card" style="display:none; padding:20px; border-left:4px solid var(--accent);">
            <h3 style="margin-top:0; color:var(--accent);">Log New Bulk Stock</h3>
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap:15px;">
                <div>
                    <label style="font-size:0.65rem; font-weight:800; color:var(--text-muted);">MATERIAL TYPE</label>
                    <select id="new-type"></select>
                </div>
                <div>
                    <label style="font-size:0.65rem; font-weight:800; color:var(--text-muted);">THICKNESS</label>
                    <select id="new-thickness"></select>
                </div>
                <div>
                    <label style="font-size:0.65rem; font-weight:800; color:var(--text-muted);">LENGTH (in)</label>
                    <input type="number" id="new-len" step="0.01" placeholder="120.0">
                </div>
                <div>
                    <label style="font-size:0.65rem; font-weight:800; color:var(--text-muted);">HEIGHT (in)</label>
                    <input type="number" id="new-wid" step="0.01" placeholder="60.0">
                </div>
                <div>
                    <label style="font-size:0.65rem; font-weight:800; color:var(--text-muted);">LOCATION</label>
                    <select id="new-location"></select>
                </div>
                <div>
                    <label style="font-size:0.65rem; font-weight:800; color:var(--text-muted);">QUANTITY</label>
                    <input type="number" id="new-qty" value="1" min="1">
                </div>
                <div style="grid-column: span 2;">
                    <label style="font-size:0.65rem; font-weight:800; color:var(--text-muted);">NOTES</label>
                    <input type="text" id="new-notes" placeholder="Optional notes...">
                </div>
                <div style="display:flex; align-items:flex-end;">
                    <button class="btn-primary" style="width:100%" onclick="submitNewItem()">Submit to Sheet</button>
                </div>
            </div>
        </section>

        <section class="inventory-card filter-container">
            <div><label>Material</label><select id="filter-material" onchange="loadInventoryData()"></select></div>
            <div><label>Thickness</label><select id="filter-thickness" onchange="applyFilters()"></select></div>
            <div><label>Location</label><select id="filter-location" onchange="applyFilters()"></select></div>
            <div><label>Size</label><input type="text" id="filter-size" onkeyup="applyFilters()" placeholder="Search size..."></div>
            <div><label>Cert # Search</label><input type="text" id="filter-cert" onkeyup="applyFilters()" placeholder="Cert # search..."></div>
            <div class="filter-actions">
                <button onclick="resetFilters()" class="btn-secondary">RESET</button>
            </div>
        </section>

        <div class="inventory-card">
            <table>
                <thead>
                    <tr>
                            <th>ID</th>
                            <th>Type</th>
                            <th>Thickness</th>
                            <th>Size</th>
                            <th>Location</th>
                            <th>Available Qty</th>
                            <th>Total Qty</th>
                            <th>Date Added</th>
                            <th>User</th>
                            <th>Notes</th>
                            <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="inventory-table-body">
                    </tbody>
            </table>
        </div>
    </main>

    <div id="transaction-modal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header" style="border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 20px;">
                <h2 id="modal-title" style="margin:0; color:var(--accent);">Transaction</h2>
                <p id="modal-part-id" style="font-family:monospace; color:var(--text-muted); margin-top:5px; font-size:0.8rem;"></p>
            </div>
            
            <div id="modal-job-group" style="margin-bottom:1.5rem; display:none;">
                <label style="font-size:0.7rem; font-weight:800; color:var(--text-muted); text-transform:uppercase; display:block; margin-bottom:8px;">Job Number / Purpose</label>
                <input type="text" id="modal-job-input" placeholder="e.g. 24-001">
            </div>

            <div id="modal-qty-group" style="margin-bottom:1.5rem; display:none;">
                <label style="font-size:0.7rem; font-weight:800; color:var(--text-muted); text-transform:uppercase; display:block; margin-bottom:8px;">Quantity</label>
                <input type="number" id="modal-qty-input" value="1" min="1">
            </div>

            <div id="modal-use-mode-group" style="margin-bottom:1.5rem; display:none;">
                <label style="font-size:0.7rem; font-weight:800; color:var(--text-muted); text-transform:uppercase; display:block; margin-bottom:8px;">Use Mode</label>
                <div style="display:flex; flex-direction:column; gap:8px;">
                    <label style="font-weight:700;"><input type="radio" name="modal-use-mode" id="modal-use-nonreserved" value="nonReserved" checked><span>Use non-reserved pieces (subtract available + total)</span></label>
                    <label style="font-weight:700;"><input type="radio" name="modal-use-mode" id="modal-use-reserved" value="reserved"><span>Use reserved pieces only (subtract total only)</span></label>
                    <div id="modal-use-mode-note" style="font-size:0.8rem; color:var(--text-muted); margin-top:4px;"></div>
                </div>
            </div>

            <div id="modal-reserved-for-group" style="margin-bottom:1.5rem; display:none;">
                <label style="font-size:0.7rem; font-weight:800; color:var(--text-muted); text-transform:uppercase; display:block; margin-bottom:8px;">Reserved For</label>
                <input type="text" id="modal-reserved-for-input" placeholder="Name or job">
            </div>

            <div class="modal-footer" style="display:flex; gap:10px;">
                <button class="btn-primary" style="flex:1;" onclick="submitTransaction()">Confirm</button>
                <button class="btn-secondary" style="flex:1;" onclick="closeTransactionModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
    <script src="../scripts/config.js"></script>
    <script src="../scripts/header.js"></script>
    <script src="../scripts/constants.js"></script>
    <script src="../scripts/sheet.js"></script>
    <script>
        // Critical: Set this page's context to Full Sheet spreadsheet ID
        window.CURRENT_RESOURCE_ID = SHEET_CONFIG.IDS.FULL_SHEET;
    </script>
</body>
</html>
