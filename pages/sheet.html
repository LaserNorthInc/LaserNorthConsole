<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheet Inventory | LNI Console</title>
    <link rel="stylesheet" href="../styles/dashboard.css">
    <style>
        .status-available { color: #00e676; font-weight: bold; }
        .status-reserved { color: var(--accent); font-weight: bold; }
        input, select { background:#0a0a0b; color:white; border:1px solid var(--border); padding:10px; border-radius:4px; width:100%; box-sizing:border-box; }
        label { font-size: 0.7rem; color: var(--text-muted); display: block; margin-bottom: 4px; font-weight: bold; }
        .btn-submit { background:var(--accent); color:black; font-weight:800; border:none; padding:12px 24px; border-radius:4px; cursor:pointer; text-transform:uppercase; }
        .action-btn { padding: 6px 12px; border-radius: 4px; font-size: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin: 0 2px; }
        .btn-reserve { border: 1px solid var(--accent); background: transparent; color: var(--accent); }
        .btn-use { background: #ff4444; color: white; border: none; }
    </style>
</head>
<body>
    <nav class="app-nav">
        <div class="nav-brand">LNI CONSOLE</div>
        <div class="nav-tabs" id="nav-links">
            <a href="dashboard.html" class="tab">Dashboard</a>
            <a href="structural.html" class="tab">Structural</a>
            <a href="sheet.html" class="tab active">Sheet</a>
        </div>
        <button class="logout-btn" onclick="logoutUser()">Logout</button>
    </nav>

    <main class="content-container">
        <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:20px;">
            <h1 style="margin:0; font-size: 2rem;">Sheet Inventory</h1>
            <button class="btn-submit" onclick="toggleForm()">+ Add Remnant</button>
        </div>

        <section class="inventory-card filter-container" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap:15px; padding:20px;">
            <div><label>Material</label><select id="filter-type" onchange="loadSheetData()"></select></div>
            <div><label>Thickness</label><select id="filter-thick" onchange="filterInventory()"></select></div>
            <div><label>Location</label><select id="filter-loc" onchange="filterInventory()"></select></div>
            <div><label>Status</label>
                <select id="filter-status" onchange="filterInventory()">
                    <option value="">All</option>
                    <option value="AVAILABLE">Available</option>
                    <option value="RESERVED">Reserved</option>
                </select>
            </div>
            <div><label>Size</label><input type="text" id="filter-size" onkeyup="filterInventory()" placeholder="e.g. 24x48"></div>
            <div><label>Cert #</label><input type="text" id="filter-cert" onkeyup="filterInventory()" placeholder="Heat #"></div>
            <div style="display:flex; align-items:flex-end;">
                <button onclick="clearFilters()" style="width:100%; padding:10px; background:#333; color:white; border:none; border-radius:4px; cursor:pointer; font-weight:bold;">CLEAR</button>
            </div>
        </section>

        <section id="add-item-form" class="inventory-card" style="display:none; border-left:4px solid var(--accent); padding:20px;">
            <h3 style="margin:0 0 20px 0; color:var(--accent);">Upload New Sheet Remnant</h3>
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap:15px;">
                <div><label>Material Type</label><select id="new-type"></select></div>
                <div><label>Thickness</label><select id="new-thickness"></select></div>
                <div><label>Length (in)</label><input type="number" id="new-len" step="0.01"></div>
                <div><label>Width (in)</label><input type="number" id="new-wid" step="0.01"></div>
                <div><label>Location</label><select id="new-location"></select></div>
                <div><label>Cert #</label><input type="text" id="new-cert-add"></div>
                <div><label>Notes</label><input type="text" id="new-notes"></div>
                <div style="display:flex; align-items:flex-end;"><button class="btn-submit" style="width:100%" onclick="submitNewItem()">Upload</button></div>
            </div>
        </section>

        <div class="inventory-card" style="padding:0;">
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th><th>Material</th><th>Thick</th><th>Size</th><th>Location</th>
                            <th>Cert #</th><th>Date</th><th>Status</th><th>User</th><th style="text-align:center;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="sheet-list"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
    <script src="../scripts/config.js"></script>
    <script src="../scripts/constants.js"></script>
    <script src="../scripts/sheet.js"></script>
</body>
</html>
