<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cropper Remnants | LNI Console</title>
    <link rel="stylesheet" href="../styles/dashboard.css">
</head>
<body>
    <nav class="app-nav">
        <div class="nav-left-group">
            <div class="nav-brand">LNI CONSOLE</div>
            <div class="nav-tabs">
                <a href="dashboard.html" class="tab">Dashboard</a>
                <a href="structural.html" class="tab">Structural</a>
                <div class="dropdown">
                    <button class="tab active dropdown-btn">Sheets ▾</button>
                    <div class="dropdown-content">
                        <a href="full-sheets.html">Full Sheet Stock</a>
                        <a href="sheet.html">Cropper Remnants</a>
                    </div>
                </div>
            </div>
        </div>
        <div style="display:flex; gap:10px; align-items:center;">
            <button class="logout-btn" onclick="logoutUser()">Logout</button>
            <button class="menu-toggle" onclick="toggleMobileMenu()">☰</button>
        </div>
    </nav>

    <main class="content-container">
        <div class="header-action-row">
            <h1>Cropper Remnants</h1>
            <button class="btn-primary" onclick="toggleForm()">+ Add Remnant</button>
        </div>

        <section id="add-item-form" class="inventory-card" style="display:none; padding:20px; border-left:4px solid var(--accent);">
            <h3 style="margin-top:0; color:var(--accent);">Log New Remnant</h3>
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap:15px;">
                <div><label>Type</label><select id="new-type"></select></div>
                <div><label>Thickness</label><select id="new-thickness"></select></div>
                <div><label>Length (in)</label><input type="number" id="new-len" step="0.01"></div>
                <div><label>Width (in)</label><input type="number" id="new-wid" step="0.01"></div>
                <div><label>Location</label><select id="new-location"></select></div>
                <div><label>Cert #</label><input type="text" id="new-cert-add"></div>
                <div><label>Notes</label><input type="text" id="new-notes"></div>
                <div style="display:flex; align-items:flex-end;"><button class="btn-primary" onclick="submitNewItem()">Submit</button></div>
            </div>
        </section>

        <section class="inventory-card filter-container">
            <div><label>Material</label><select id="filter-material" onchange="loadInventoryData()"></select></div>
            <div><label>Thickness</label><select id="filter-thickness" onchange="applyFilters()"></select></div>
            <div><label>Location</label><select id="filter-location" onchange="applyFilters()"></select></div>
            <div><label>Status</label><select id="filter-status" onchange="applyFilters()"><option value="">All</option><option value="AVAILABLE">Available</option><option value="RESERVED">Reserved</option></select></div>
            <div><label>Size</label><input type="text" id="filter-size" onkeyup="applyFilters()"></div>
            <div><label>Cert #</label><input type="text" id="filter-cert" onkeyup="applyFilters()"></div>
            <button onclick="resetFilters()" class="btn-secondary">RESET</button>
        </section>

        <div class="inventory-card">
            <table>
                <thead>
                    <tr><th>ID</th><th>Material</th><th>Thick</th><th>Size</th><th>Loc</th><th>Cert #</th><th>Date Added</th><th>Status</th><th>User</th><th>Actions</th></tr>
                </thead>
                <tbody id="inventory-table-body"></tbody>
            </table>
        </div>
    </main>

    <div id="transaction-modal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h2 id="modal-title" style="margin:0; color:var(--accent);">Transaction</h2>
                <p id="modal-part-id" style="font-family:monospace; color:var(--text-muted);"></p>
            </div>
            <div id="modal-job-group" style="margin-bottom:1.2rem; display:none;">
                <label style="font-size:0.7rem; font-weight:800; color:var(--text-muted); display:block; margin-bottom:5px;">JOB NUMBER</label>
                <input type="text" id="modal-job-input">
            </div>
            <div id="modal-qty-group" style="margin-bottom:1.2rem; display:none;">
                <label style="font-size:0.7rem; font-weight:800; color:var(--text-muted); display:block; margin-bottom:5px;">QUANTITY</label>
                <input type="number" id="modal-qty-input" value="1" min="1">
            </div>
            <div class="modal-footer" style="display:flex; gap:10px;">
                <button class="btn-primary" style="flex:1" onclick="submitTransaction()">Confirm</button>
                <button class="btn-secondary" style="flex:1" onclick="closeTransactionModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script src="../scripts/config.js"></script>
    <script src="../scripts/constants.js"></script>
    <script src="../scripts/sheet.js"></script>
    <script>window.CURRENT_RESOURCE_ID = SHEET_CONFIG.IDS.CROPPER_SHEET;</script>
</body>
</html>
