<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheet Inventory | LNI Console</title>
    <link rel="stylesheet" href="../styles/dashboard.css">
    <link rel="stylesheet" href="../styles/sheet.css">
</head>
<body>
    <nav class="app-nav">
        <div class="nav-brand">LNI</div>
        <div class="nav-tabs">
            <a href="dashboard.html" class="tab">Dashboard</a>
            <a href="structural.html" class="tab">Structural</a>
            <a href="sheet.html" class="tab active">Sheet</a>
        </div>
        <button class="logout-btn" onclick="logoutUser()">Logout</button>
    </nav>

    <main class="content-container">
        <div id="admin-tools" style="display:none; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h1>Sheet Inventory</h1>
            <button class="btn-submit" onclick="toggleForm()">+ Add / Reserve Item</button>
        </div>

        <section id="add-item-form" style="display:none;">
            <h3>New Stock Entry</h3>
            <div class="form-grid">
                <input type="text" id="new-type" placeholder="Type (A1011...)">
                <input type="text" id="new-thickness" placeholder="Thickness (10ga...)">
                <input type="text" id="new-size" placeholder="Size (LxW)">
                <input type="text" id="new-location" placeholder="Location">
                <input type="text" id="new-cert" placeholder="Cert #">
                <input type="text" id="new-job" placeholder="Reserve for Job #">
                <input type="text" id="new-notes" placeholder="Notes">
                <button class="btn-submit" onclick="submitNewItem()">Upload to Sheet</button>
            </div>
        </section>

        <div class="inventory-card">
            <table>
                <thead>
                    <tr>
                        <th>ID</th><th>Type</th><th>Thickness</th><th>Size</th>
                        <th>Location</th><th>Cert</th><th>Added</th><th>Reserved</th><th>User</th><th>Notes</th>
                    </tr>
                </thead>
                <tbody id="sheet-list"></tbody>
            </table>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script src="../scripts/config.js"></script>
    <script src="../scripts/sheet.js"></script>
</body>
</html>
