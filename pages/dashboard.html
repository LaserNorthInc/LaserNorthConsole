<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | LNI Console</title>
    <link rel="stylesheet" href="../styles/dashboard.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="content-container">
        <h1>Overview</h1>
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap:20px; margin-bottom: 30px;">
            <div class="inventory-card" style="padding:20px; border-top: 4px solid var(--accent);">
                <h3 style="margin-top:0; color:var(--text-muted);">STRUCTURAL STOCK</h3>
                <p id="struct-count" style="font-size:2rem; font-weight:800; color:var(--accent);">...</p>
            </div>
            <div class="inventory-card" style="padding:20px; border-top: 4px solid var(--accent);">
                <h3 style="margin-top:0; color:var(--text-muted);">SHEET STOCK</h3>
                <p id="sheet-count" style="font-size:2rem; font-weight:800; color:var(--accent);">...</p>
            </div>
        </div>


    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
    <script src="../scripts/config.js"></script>
    <script src="../scripts/header.js"></script>
    <script src="../scripts/dashboard.js"></script>
</body>
</html>
