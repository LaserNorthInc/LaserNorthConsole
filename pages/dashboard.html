<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | LNI</title>
    <link rel="stylesheet" href="../styles/dashboard.css">
</head>
<body>
    <nav class="app-nav">
        <div class="nav-brand">LNI CONSOLE</div>
        <div class="nav-tabs">
            <a href="dashboard.html" class="tab active">Dashboard</a>
            <a href="structural.html" class="tab">Structural</a>
            <a href="sheet.html" class="tab">Sheet</a>
        </div>
        <button class="logout-btn" onclick="logoutUser()">Logout</button>
    </nav>

    <main class="content-container">
        <h1>Overview</h1>
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap:20px;">
            <div class="inventory-card" style="padding:20px; border-top: 4px solid var(--accent);">
                <h3 style="margin-top:0; color:var(--text-muted);">STRUCTURAL STOCK</h3>
                <p id="struct-count" style="font-size:2rem; font-weight:800; color:var(--accent);">...</p>
            </div>
            <div class="inventory-card" style="padding:20px; border-top: 4px solid var(--accent);">
                <h3 style="margin-top:0; color:var(--text-muted);">SHEET STOCK</h3>
                <p id="sheet-count" style="font-size:2rem; font-weight:800; color:var(--accent);">...</p>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script src="../scripts/config.js"></script>
</body>
</html>
