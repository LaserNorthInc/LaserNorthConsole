<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheet Inventory | LNI Console</title>
    <link rel="stylesheet" href="../styles/dashboard.css">
    <link rel="stylesheet" href="../styles/sheet.css">
</head>
<body>
    <nav class="app-nav">
        <div class="nav-brand">LNI CONSOLE</div>
        <button class="mobile-menu-btn" onclick="toggleMenu()">☰ MENU</button>
        <div class="nav-tabs" id="nav-links">
            <a href="dashboard.html" class="tab">Dashboard</a>
            <a href="structural.html" class="tab">Structural</a>
            <a href="sheet.html" class="tab active">Sheet</a>
        </div>
    </nav>

    <main class="content-container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h1>Sheet Inventory</h1>
            <button class="btn-submit" onclick="toggleForm()">+ Add / Reserve</button>
        </div>

        <!-- SEARCH FILTERS -->
        <section class="inventory-card filter-bar">
            <input type="text" id="filter-type" placeholder="Search Material..." onkeyup="filterInventory()">
            <input type="text" id="filter-thick" placeholder="Search Thickness..." onkeyup="filterInventory()">
            <input type="text" id="filter-size" placeholder="Search Size..." onkeyup="filterInventory()">
            <input type="text" id="filter-cert" placeholder="Search Cert #..." onkeyup="filterInventory()">
            <select id="filter-reserve" onchange="filterInventory()">
                <option value="">Status: All</option>
                <option value="AVAILABLE">Only Available</option>
                <option value="RESERVED">Only Reserved</option>
            </select>
        </section>

        <!-- ADD NEW ENTRY FORM -->
        <section id="add-item-form" class="inventory-card" style="display:none; padding:20px; border-left:4px solid var(--accent);">
            <h3>Upload New Remnant</h3>
            <div class="form-grid" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap:10px;">
                <input type="text" id="new-type" placeholder="Material Type">
                <input type="text" id="new-thickness" placeholder="Thickness">
                <input type="text" id="new-size" placeholder="Size (LxW)">
                <input type="text" id="new-location" placeholder="Location">
                <input type="text" id="new-cert" placeholder="Cert #">
                <input type="text" id="new-job" placeholder="Reserve for Job (Opt)">
                <input type="text" id="new-notes" placeholder="Notes">
                <button class="btn-submit" onclick="submitNewItem()">Upload</button>
            </div>
        </section>

        <!-- RACK DATA TABLE -->
        <div class="inventory-card">
            <table>
                <thead>
                    <tr><th>ID</th><th>Type</th><th>Thick</th><th>Size</th><th>Location</th><th>Cert</th><th>Added</th><th>Reserve</th><th>User</th><th>Notes</th></tr>
                </thead>
                <tbody id="sheet-list"></tbody>
            </table>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script src="../scripts/config.js"></script>
    <script src="../scripts/sheet.js"></script>
</body>
</html>
