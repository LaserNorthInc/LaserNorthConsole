<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes Terminal | LNI Console</title>
    <link rel="stylesheet" href="../styles/dashboard.css">
    <style>
        #notes-list { 
            display: flex; 
            flex-direction: column; 
            gap: 25px; 
            margin-top: 20px; 
            width: 100%; 
        }
        
        .note-container {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }

        .note-header {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cat-label {
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--accent);
            text-transform: uppercase;
        }

        /* Line Item Layout */
        .line-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            padding: 12px 20px;
            gap: 20px;
            transition: background 0.2s;
        }

        .line-item:hover { background: rgba(255,255,255,0.01); }

        .line-content-wrapper { flex: 1; display: flex; flex-direction: column; gap: 4px; }

        .line-text-input {
            background: transparent;
            border: none;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            outline: none;
            width: 100%;
            padding: 4px 0;
            border-bottom: 1px solid transparent;
        }

        .line-text-input:not([readonly]) {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .line-meta {
            font-size: 0.65rem;
            color: var(--text-muted);
            font-family: 'Monaco', 'Consolas', monospace;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            pointer-events: none;
            user-select: none;
        }

        .line-meta b { color: var(--accent); opacity: 0.8; }

        /* Filter Grid Styling */
        .filter-grid {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 15px;
            align-items: end;
        }

        .search-input {
            background: #0a0a0b;
            border: 1px solid var(--border);
            color: white;
            padding: 10px;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
            font-weight: 600;
        }
        .search-input:focus { border-color: var(--accent); outline: none; }

        /* Button States */
        .btn-group { display: flex; gap: 8px; align-items: center; }

        .btn-line-edit, .btn-line-save, .btn-line-delete {
            border: 1px solid var(--border);
            font-size: 0.6rem;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 800;
        }

        .btn-line-edit { background: rgba(255,255,255,0.05); color: var(--text-muted); }
        .btn-line-edit:hover { border-color: var(--accent); color: var(--accent); }

        .btn-line-delete { 
            background: rgba(220, 53, 69, 0.05); 
            color: #ff4d4d; 
            border-color: rgba(220, 53, 69, 0.2); 
        }
        .btn-line-delete:hover { background: #ff4d4d; color: white; }

        .btn-line-save {
            background: var(--success);
            color: #000;
            border-color: var(--success);
            display: none;
        }

        .editing .btn-line-save { display: block; }
        .editing .btn-line-edit, .editing .btn-line-delete { display: none; }

        .add-line-row {
            padding: 15px 20px;
            background: rgba(0,0,0,0.1);
            display: flex;
            justify-content: flex-start;
        }

        /* Modal Quick-Add Styling */
        .initial-lines-area {
            width: 100%;
            background: #0a0a0b;
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 4px;
            margin-top: 10px;
            font-family: 'Monaco', monospace;
            font-size: 0.8rem;
            resize: vertical;
            min-height: 80px;
            outline: none;
        }

        .modal-label {
            display: block;
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 800;
            margin-top: 15px;
            letter-spacing: 1px;
        }

        .sync-status { font-size: 0.7rem; text-transform: uppercase; font-weight: 800; }
        .status-online { color: var(--success); }
        .status-offline { color: var(--danger); }

        /* Custom Confirmation Styles */
        #confirm-modal .modal-card {
            max-width: 400px;
            border: 1px solid var(--accent);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        #confirm-proceed { color: #000; }
    </style>
</head>
<body data-page-mode="notes">
    <div id="header-placeholder"></div>
    <div id="toast-container"></div>

    <main class="content-container">
        <div class="header-action-row">
            <div>
                <h1>Industrial Notes</h1>
                <p id="cloud-status" class="sync-status status-offline">Initializing Terminal...</p>
            </div>
            <div class="header-actions">
                <button id="add-note-btn" class="btn-primary">+ New Category</button>
            </div>
        </div>

        <div class="inventory-card">
            <div class="filter-container">
                <div class="filter-grid">
                    <div>
                        <label>Search Notes</label>
                        <input type="text" id="string-search" class="search-input" placeholder="Search keywords..." oninput="renderNotes()">
                    </div>
                    <div>
                        <label>Category Filter</label>
                        <select id="filter-category" onchange="renderNotes()">
                            <option value="all">SHOW ALL CATEGORIES</option>
                        </select>
                    </div>
                    <button class="btn-primary" style="background: var(--success); height: 40px; min-width: 100px;" onclick="autoSync()">Sync Now</button>
                </div>
            </div>
        </div>

        <div id="notes-list"></div>
    </main>

    <div id="add-modal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h2>New Data Category</h2>
                <p>Registering new system data node.</p>
            </div>
            
            <label class="modal-label">Category Title</label>
            <input type="text" id="new-cat-input" class="modal-input" style="margin-top:5px;" placeholder="e.g. SHOP LOGS">
            
            <label class="modal-label">Initial Entry Lines (Optional)</label>
            <textarea id="initial-lines-input" class="initial-lines-area" placeholder="Enter lines here...&#10;Press Enter for each new line."></textarea>
            
            <div class="modal-footer">
                <button onclick="closeModal('add-modal')" class="btn-secondary">Abort</button>
                <button id="add-exec" class="btn-primary">Initialize</button>
            </div>
        </div>
    </div>

    <div id="confirm-modal" class="modal-overlay" style="display: none; z-index: 9999;">
        <div class="modal-card">
            <div class="modal-header">
                <h2 id="confirm-title">System Confirmation</h2>
                <p id="confirm-msg">Action requires terminal authorization.</p>
            </div>
            <div class="modal-footer" style="justify-content: flex-end; gap: 12px;">
                <button id="confirm-cancel" class="btn-secondary">Cancel</button>
                <button id="confirm-proceed" class="btn-primary">Confirm</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script src="../scripts/config.js"></script>
    <script src="../scripts/header.js"></script>
    <script>
        const SCRIPT_URL = "https://script.google.com/a/macros/lasernorthinc.com/s/AKfycbwmxQZoV48TC4Zgtq9AgC85NuCoA4m5S_FHkZTrNqHR0SAdnoMZNbzJZKo2jvEYHhE/exec";
        let notesData = [];

        // --- Custom Confirmation Engine ---
        function customConfirm(title, message, isDanger = true) {
            return new Promise((resolve) => {
                const modal = document.getElementById('confirm-modal');
                const titleEl = document.getElementById('confirm-title');
                const msgEl = document.getElementById('confirm-msg');
                const proceedBtn = document.getElementById('confirm-proceed');
                const cancelBtn = document.getElementById('confirm-cancel');

                titleEl.innerText = title;
                msgEl.innerText = message;
                
                proceedBtn.style.background = isDanger ? '#ff4d4d' : 'var(--success)';
                proceedBtn.style.borderColor = isDanger ? '#ff4d4d' : 'var(--success)';

                modal.style.display = 'flex';

                const handleAction = (choice) => {
                    modal.style.display = 'none';
                    proceedBtn.onclick = null;
                    cancelBtn.onclick = null;
                    resolve(choice);
                };

                proceedBtn.onclick = () => handleAction(true);
                cancelBtn.onclick = () => handleAction(false);
            });
        }

        async function loadNotes() {
            try {
                const response = await fetch(SCRIPT_URL);
                const raw = await response.json();
                notesData = Array.isArray(raw) ? raw : [];
                renderNotes();
                updateSyncStatus("Cloud Synced", "online");
            } catch (e) {
                updateSyncStatus("Offline Cache", "offline");
                const local = localStorage.getItem('lni_notes_v3');
                if (local) notesData = JSON.parse(local);
                renderNotes();
            }
        }

        function renderNotes() {
            const list = document.getElementById('notes-list');
            const catFilter = document.getElementById('filter-category').value;
            const searchQuery = document.getElementById('string-search').value.toLowerCase();
            list.innerHTML = '';

            const categories = [...new Set(notesData.map(n => n.category))];
            const filterEl = document.getElementById('filter-category');
            const currentVal = filterEl.value;
            filterEl.innerHTML = '<option value="all">SHOW ALL CATEGORIES</option>' + 
                categories.map(c => `<option value="${c}" ${currentVal === c ? 'selected' : ''}>${c.toUpperCase()}</option>`).join('');

            notesData.forEach(cat => {
                if (catFilter !== 'all' && cat.category !== catFilter) return;

                const linesToDisplay = (cat.lines || []).filter(line => 
                    line.text.toLowerCase().includes(searchQuery) || 
                    cat.category.toLowerCase().includes(searchQuery)
                );

                if (searchQuery && linesToDisplay.length === 0 && !cat.category.toLowerCase().includes(searchQuery)) return;

                const container = document.createElement('div');
                container.className = 'note-container';
                
                let linesHtml = (cat.lines || []).map((line, idx) => {
                    // Filter lines based on search
                    const matches = !searchQuery || line.text.toLowerCase().includes(searchQuery) || cat.category.toLowerCase().includes(searchQuery);
                    if(!matches) return '';

                    return `
                    <div class="line-item" id="item-${cat.id}-${idx}">
                        <div class="line-content-wrapper">
                            <input type="text" class="line-text-input" 
                                id="input-${cat.id}-${idx}"
                                value="${line.text}" 
                                readonly>
                            <span class="line-meta">Last Edit: <b>${line.user}</b> @ ${line.time}</span>
                        </div>
                        <div class="btn-group">
                            <button class="btn-line-edit" onclick="enableLineEdit(${cat.id}, ${idx})">Modify</button>
                            <button class="btn-line-delete" onclick="deleteLine(${cat.id}, ${idx})">Delete</button>
                            <button class="btn-line-save" onclick="saveLineEdit(${cat.id}, ${idx})">Save Entry</button>
                        </div>
                    </div>
                `}).join('');

                container.innerHTML = `
                    <div class="note-header">
                        <span class="cat-label">${cat.category}</span>
                        <button class="btn-action btn-remove" onclick="deleteCategory(${cat.id})">Remove Category</button>
                    </div>
                    <div class="lines-body">${linesHtml || '<p style="padding:20px; font-size:0.8rem; color:var(--text-muted);">No entries found.</p>'}</div>
                    <div class="add-line-row">
                        <button class="btn-primary" style="font-size:0.65rem; padding:6px 12px;" onclick="addNewLine(${cat.id})">+ New Entry Line</button>
                    </div>
                `;
                list.appendChild(container);
            });
        }

        window.addNewLine = (catId) => {
            const cat = notesData.find(c => c.id === catId);
            const user = firebase.auth().currentUser;
            const userEmail = user ? user.email.split('@')[0] : "SHOP-USER";
            const timestamp = new Date().toLocaleString('en-US', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});

            if (!cat.lines) cat.lines = [];
            cat.lines.push({ text: "", user: userEmail, time: timestamp });
            renderNotes();
            enableLineEdit(catId, cat.lines.length - 1);
        };

        window.enableLineEdit = (catId, lineIndex) => {
            document.querySelectorAll('.line-item').forEach(el => el.classList.remove('editing'));
            const item = document.getElementById(`item-${catId}-${lineIndex}`);
            const input = document.getElementById(`input-${catId}-${lineIndex}`);
            if(item && input) {
                item.classList.add('editing');
                input.readOnly = false;
                input.focus();
            }
        };

        window.saveLineEdit = (catId, lineIndex) => {
            const cat = notesData.find(c => c.id === catId);
            const line = cat.lines[lineIndex];
            const input = document.getElementById(`input-${catId}-${lineIndex}`);
            const item = document.getElementById(`item-${catId}-${lineIndex}`);
            const user = firebase.auth().currentUser;
            const userEmail = user ? user.email.split('@')[0] : "SHOP-USER";
            const timestamp = new Date().toLocaleString('en-US', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});

            line.text = input.value;
            line.user = userEmail;
            line.time = timestamp;
            input.readOnly = true;
            item.classList.remove('editing');
            renderNotes();
            autoSync();
        };

        window.deleteLine = async (catId, lineIndex) => {
            const confirmed = await customConfirm("DELETE ENTRY", "Are you sure you want to delete this specific line?");
            if (confirmed) {
                const cat = notesData.find(c => c.id === catId);
                if (cat && cat.lines) {
                    cat.lines.splice(lineIndex, 1);
                    renderNotes();
                    autoSync();
                }
            }
        };

        window.deleteCategory = async (id) => {
            const confirmed = await customConfirm("CRITICAL ACTION", "Warning: This will delete the entire category and all sub-entries.");
            if (confirmed) {
                notesData = notesData.filter(c => c.id !== id);
                renderNotes();
                autoSync();
            }
        };

        async function autoSync() {
            localStorage.setItem('lni_notes_v3', JSON.stringify(notesData));
            updateSyncStatus("Syncing...", "offline");
            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(notesData) });
                updateSyncStatus("Cloud Synced", "online");
            } catch (e) { updateSyncStatus("Sync Failed", "offline"); }
        }

        function updateSyncStatus(msg, type) {
            const el = document.getElementById('cloud-status');
            if(el) { el.innerText = msg; el.className = `sync-status status-${type}`; }
        }

        document.getElementById('add-note-btn').onclick = () => {
            document.getElementById('new-cat-input').value = '';
            document.getElementById('initial-lines-input').value = '';
            document.getElementById('add-modal').style.display = 'flex';
        };

        document.getElementById('add-exec').onclick = () => {
            const catTitle = document.getElementById('new-cat-input').value.trim();
            const rawLines = document.getElementById('initial-lines-input').value.trim();
            
            if (catTitle) {
                const user = firebase.auth().currentUser;
                const userEmail = user ? user.email.split('@')[0] : "SHOP-USER";
                const timestamp = new Date().toLocaleString('en-US', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});

                const processedLines = rawLines.split('\n')
                    .filter(l => l.trim() !== "")
                    .map(l => ({ text: l.trim(), user: userEmail, time: timestamp }));

                notesData.push({ id: Date.now(), category: catTitle, lines: processedLines });
                renderNotes();
                autoSync();
                closeModal('add-modal');
            }
        };

        window.closeModal = (id) => document.getElementById(id).style.display = 'none';
        window.addEventListener('DOMContentLoaded', loadNotes);
    </script>
</body>
</html>
