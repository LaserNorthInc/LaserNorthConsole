<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access | LNI Console</title>
    <link rel="stylesheet" href="../styles/dashboard.css">
    <style>
        body.login-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Positioning the card higher on the screen */
            justify-content: flex-start; 
            min-height: 100vh;
            margin: 0;
            padding: 0;
            background-color: var(--bg-deep);
            /* Industrial Blueprint Grid */
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            font-family: 'Inter', sans-serif;
        }

        /* Buffer to push the container down from the very top, but keep it high */
        .top-buffer {
            height: 15vh;
        }

        #login-container {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-top: 4px solid var(--accent);
            padding: 40px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            border-radius: var(--radius);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            position: relative;
        }

        /* Subtle terminal label */
        #login-container::before {
            content: "LNI TERMINAL ACCESS";
            position: absolute;
            top: -25px;
            left: 0;
            font-family: monospace;
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 2px;
        }

        .brand-logo {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--accent);
            margin: 0;
            letter-spacing: -3px;
            line-height: 1;
        }

        .brand-sub {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 4px;
            margin: 10px 0 40px 0;
        }

        #google-signin-btn {
            width: 100%;
            background: #ffffff;
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 4px;
            font-weight: 900;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        #google-signin-btn:hover {
            background: #f1f1f1;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 107, 0, 0.3);
        }

        .security-footer {
            margin-top: 30px;
            font-size: 0.65rem;
            color: var(--text-muted);
            line-height: 1.8;
            text-transform: uppercase;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }
    </style>
</head>
<body class="login-layout">

    <div class="top-buffer"></div>
    
    <div id="login-container">
        <h1 class="brand-logo">LNI</h1>
        <p class="brand-sub">Inventory Console</p>
        
        <button id="google-signin-btn">
            <img src="https://www.gstatic.com/images/branding/googleg/1x/googleg_standard_color_64dp.png" width="20" alt="G">
            Sign In with Workspace
        </button>

        <div class="security-footer">
            Authorized Personnel Only<br>
            System Access is Logged and Monitored
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script src="../scripts/config.js"></script>
    <script src="../scripts/login.js"></script>
</body>
</html>
